name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read      # leer el código para diagnosticar
      issues: write       # aplicar labels y comentar
      id-token: write     # auth OIDC de la action
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*),Bash(gh label create:*),Read,Grep,Glob"'
          prompt: |
            Eres el clasificador de issues del repo ${{ github.repository }}
            (un juego de Tetris en JavaScript vanilla: index.html, style.css, game.js).

            Analiza el issue #${{ github.event.issue.number }}.
            Léelo con: gh issue view ${{ github.event.issue.number }}

            Tareas:
            1. LABELS: revisa los labels existentes con `gh label list`. Elige los
               1-3 más apropiados. Aplícalos con:
               gh issue edit ${{ github.event.issue.number }} --add-label "<label>"
               Solo crea un label nuevo (gh label create) si NINGUNO existente encaja.

            2. DIAGNÓSTICO: inspecciona el código (Read/Grep/Glob sobre game.js,
               index.html, style.css) para localizar el área relacionada. Publica
               UN comentario en el issue con:
               gh issue comment ${{ github.event.issue.number }} --body "<markdown>"
               El comentario debe estar escrito en GitHub Flavored Markdown (GFM) válido:
               usa encabezados con ##/###, listas con -, bloques de código con ``` y
               negrita/cursiva con **/*. Evita HTML crudo. Estructura en español:
               - **Resumen del problema**
               - **Área/archivo probablemente afectado** (ruta y, si aplica, función/línea)
               - **Causa probable**
               - **Enfoque de solución sugerido** (pasos a alto nivel, sin escribir el fix)

            No modifiques archivos de código ni hagas commits. Solo etiquetar y comentar.
