<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="title-row">
      <h1 class="game-title">TETRIS</h1>
      <label class="theme-switch" for="theme-toggle" title="Cambiar tema claro/oscuro">
        <input type="checkbox" id="theme-toggle" />
        <span class="theme-switch-slider"></span>
      </label>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <div id="game-over-view">
          <p id="overlay-title">GAME OVER</p>
          <p id="overlay-score"></p>
          <button id="restart-btn" class="menu-btn">Reiniciar</button>
        </div>

        <div id="pause-menu" class="hidden">
          <p class="pause-title">PAUSA</p>

          <div id="pause-main" class="pause-view">
            <button id="resume-btn" class="menu-btn">Reanudar</button>
            <button id="pause-restart-btn" class="menu-btn">Reiniciar</button>
            <button id="show-controls-btn" class="menu-btn">Ver controles</button>

            <div class="pause-level-select">
              <label for="start-level-select">Nivel inicial</label>
              <select id="start-level-select"></select>
            </div>
          </div>

          <div id="pause-controls" class="pause-view hidden">
            <ul>
              <li><kbd>←</kbd><kbd>→</kbd> mover</li>
              <li><kbd>↑</kbd> rotar</li>
              <li><kbd>↓</kbd> bajar</li>
              <li><kbd>Space</kbd> caída</li>
              <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
            </ul>
            <button id="back-from-controls-btn" class="menu-btn">Volver</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
